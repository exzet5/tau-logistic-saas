name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # --- ЛОКАЛИЗАЦИЯ ---
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0  # ОБНОВИЛ ВЕРСИЮ (было 0.19.0)
  fl_chart: ^0.69.0
  # --- UI ---
  cupertino_icons: ^1.0.8
  calendar_date_picker2: ^1.1.0
  fluttertoast: ^8.2.8

  # --- FIREBASE ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.1

  mobile_scanner: ^3.5.6
  mailer: ^6.1.0
  encrypt: ^5.0.3
  http: ^1.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  universal_html: ^2.3.0
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# --- НАСТРОЙКИ ЯРЛЫКА ---
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

# --- ASSETS ---
flutter:
  uses-material-design: true
  assets:
    - assets/reuth_logo.png
    - assets/icon.png